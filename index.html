<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Map Replica</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  >
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="js/app.js"></script>
</head>
<body>
  <div id="map" aria-label="旅行地图"></div>

  <aside class="app-panel">
    <p class="eyebrow">Travel Archive</p>
    <h1 id="site-title">Travel Map</h1>
    <p id="site-subtitle" class="site-subtitle">载入中...</p>

    <section class="panel-section">
      <div id="stats" class="stat-grid"></div>
    </section>

    <section class="panel-section">
      <div class="section-heading">
        <h2>Travel Years</h2>
        <span id="year-count" class="section-meta"></span>
      </div>
      <div id="year-legend" class="year-legend"></div>
    </section>

    <section class="panel-section">
      <div class="section-heading">
        <h2>Countries</h2>
        <span id="country-count" class="section-meta"></span>
      </div>
      <div id="flag-list" class="flag-list"></div>
    </section>

    <section class="panel-section route-section">
      <div class="section-heading">
        <h2>Routes</h2>
        <span id="route-count" class="section-meta"></span>
      </div>
      <div id="route-list" class="route-list"></div>
    </section>

    <p id="panel-note" class="panel-note"></p>
  </aside>

  <div id="city-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-city-name">
      <button id="modal-close" class="modal-close" type="button" aria-label="关闭">×</button>

      <div class="modal-header">
        <div class="modal-flag-wrap">
          <img id="modal-flag" class="modal-flag" alt="">
        </div>
        <div>
          <p id="modal-country" class="modal-country"></p>
          <h2 id="modal-city-name"></h2>
          <p id="modal-coordinates" class="modal-coordinates"></p>
        </div>
      </div>

      <div class="modal-grid">
        <section>
          <h3>旅行信息</h3>
          <div class="info-list">
            <div class="info-row"><span>到访时间</span><strong id="modal-visit-date"></strong></div>
            <div class="info-row"><span>停留时长</span><strong id="modal-stay-length"></strong></div>
          </div>
          <p id="modal-description" class="modal-text"></p>
          <p id="modal-notes" class="modal-text secondary"></p>
        </section>

        <section>
          <h3>照片</h3>
          <div id="photo-frame" class="photo-frame empty">
            <img id="photo-image" alt="">
            <div id="photo-empty" class="photo-empty">暂无照片，后续可直接在 JSON 中补充。</div>
          </div>
          <div class="photo-toolbar">
            <button id="prev-photo" type="button">上一张</button>
            <span id="photo-index">0 / 0</span>
            <button id="next-photo" type="button">下一张</button>
          </div>
        </section>
      </div>
    </div>
  </div>

  <div id="app-message" class="app-message hidden"></div>
</body>
</html>
